<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="color-scheme" content="dark light" />
  <title>Anoosh</title>
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div id="anoosh-bg" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
  </div>

  <header id="topbar">
    <div class="tb-brand"><span class="tb-logo"></span><span id="tb-title">Anoosh</span></div>
    <div class="tb-spacer"></div>
    <div id="mini-timer" class="mini-timer" hidden></div>
    <button class="iconbtn" id="tb-search" aria-label="Search"></button>
  </header>

  <main id="page-root"></main>
  <div id="subpage-root"></div>

  <button id="fab" aria-label="Quick add"></button>

  <nav id="tabbar" aria-label="Main navigation"></nav>

  <div id="modal-root"></div>
  <div id="popover-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <script src="js/shared/hijri.js"></script>
  <script src="js/shared/jalali.js"></script>
  <script src="js/shared/merge.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/platform.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/timer-engine.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/views/today.js"></script>
  <script src="js/views/tasks.js"></script>
  <script src="js/views/notes.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/more.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
