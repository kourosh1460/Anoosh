name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    tags: ['ios-v*']

jobs:
  build-ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci || npm install

      - name: Copy shared modules + sync iOS
        working-directory: mobile
        run: |
          node scripts/copy-shared.js
          npx cap sync ios
          node scripts/install-native-ios.js

      - name: Build (unsigned)
        working-directory: mobile/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        working-directory: mobile/ios/App
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r Anoosh-iOS-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Anoosh-iOS-unsigned
          path: mobile/ios/App/Anoosh-iOS-unsigned.ipa
