<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' http://127.0.0.1:*" />
  <title>Anoosh</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="anoosh-bg" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>

  <div id="titlebar">
    <div class="tb-left">
      <div class="tb-logo" aria-hidden="true"></div>
      <span class="tb-title">Anoosh</span>
    </div>
    <div class="tb-drag"></div>
    <button id="tb-search" class="tb-search" title="Search everything (Ctrl+K)">
      <span class="tb-search-icon"></span><span>Search</span><kbd>Ctrl K</kbd>
    </button>
    <div class="tb-controls">
      <button id="tb-min" class="tb-btn" title="Minimize" aria-label="Minimize"></button>
      <button id="tb-max" class="tb-btn" title="Maximize" aria-label="Maximize"></button>
      <button id="tb-close" class="tb-btn tb-close" title="Close" aria-label="Close"></button>
    </div>
  </div>

  <div id="shell">
    <nav id="sidebar" aria-label="Main navigation">
      <div class="nav-list" id="nav-list"></div>
      <div class="side-bottom">
        <div id="mini-timer" class="mini-timer" hidden></div>
        <button class="nav-item" data-view="settings" id="nav-settings"></button>
      </div>
    </nav>
    <main id="view-root"></main>
  </div>

  <div id="modal-root"></div>
  <div id="popover-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <script src="../src/shared/hijri.js"></script>
  <script src="../src/shared/jalali.js"></script>
  <script src="../src/shared/lock.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/timer-engine.js"></script>
  <script src="../src/shared/dash-modules.js"></script>
  <script src="../src/shared/onboarding.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/tasks.js"></script>
  <script src="js/views/notes.js"></script>
  <script src="js/views/ideas.js"></script>
  <script src="js/views/calendar.js"></script>
  <script src="js/views/timer.js"></script>
  <script src="js/views/reminders.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/selftest.js"></script>
</body>
</html>
